<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Reserva - Apollo Restaurante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
     .topo {
     display: flex;
     justify-content: center; /* centraliza horizontalmente */
     align-items: flex-start; /* mantém no topo */
     margin-top: 20px; /* opcional */
}
    .modal {
      background: #fff;
      width: 320px;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      position: relative;
      justify-content: center;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
      color: #ff6a00;
      letter-spacing: 2px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #ff6a00;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #e55d00;
    }
  </style>
</head>
<body>

  <div class="modal">
    <div class="close">✕</div>

    <div class="topo">
  <img src="file:///C:/Users/joaov/OneDrive/Documentos/doc%20UFRN/Logo%20Apollo%2001%20branco.jpg" alt="Apollo Restaurante" width="250" height="100">
</div>
   
    <h2>Faça sua reserva</h2>

    <form>
      <label>Nome completo</label>
      <input type="text" placeholder="Digite seu nome">

      <label>Data</label>
      <input type="text" placeholder="dd/mm/aaaa">

      <label>Horário</label>
      <input type="time">

      <label>Quantidade de pessoas</label>
      <select>
        <option>1 pessoa</option>
        <option selected>2 pessoas</option>
        <option>3 pessoas</option>
        <option>4 pessoas</option>
        <option>5 pessoas</option>
        <option>6 pessoas</option>
      </select>

      <button class="btn">CONFIRMAR RESERVA</button>
    </form>
  </div>

</body>
</html>
