<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Apollo Restaurante</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #000;
    }

    .footer {
      background-color: #111;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .logo h1 {
      color: #ff8800;
      font-size: 34px;
      letter-spacing: 2px;
    }

    .logo span {
      border-bottom: 3px solid #ff8800;
    }

    .logo p {
      color: #aaa;
      font-size: 12px;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    h2 {
      color: #fff;
      font-size: 22px;
      margin: 25px 0 15px;
    }

    .contato p {
      margin: 10px 0;
      color: #ddd;
    }

    .contato i {
      color: #ff8800;
      margin-right: 8px;
    }

    .horario p {
      margin: 8px 0;
      color: #ddd;
    }

    .social {
      margin-top: 30px;
    }

    .social i {
      font-size: 20px;
      margin: 0 10px;
      color: #bbb;
      cursor: pointer;
      transition: 0.3s;
    }

    .social i:hover {
      color: #ff8800;
    }
  </style>
</head>

<body>

  <section class="footer">
    <div class="container">

      <!-- Logo -->
      <div class="logo">
        <img src="C:\Users\joaov\OneDrive\Documentos\doc UFRN\Logo Apollo 02 - preta.jpg" alt="Apollo Restaurante" width="230" height="80">
      </div>

      <!-- Contato -->
      <div class="contato">
        <h2>Contato</h2>
        <p><i class="fa fa-phone"></i> (11) 92234-5678</p>
        <p><i class="fa fa-envelope"></i> RestauranteApollo@gmail.com</p>
        <p><i class="fa fa-location-dot"></i> Avenida Roberto Freire, 123 - Natal/RN</p>
      </div>

      <!-- Horário -->
      <div class="horario">
        <h2>Horário de Funcionamento</h2>
        <p>Segunda a sexta: 13h - 22h</p>
        <p>Sábado e domingo: 12h - 22h</p>
        <p>Feriados: 12h - 22h</p>
      </div>

      <!-- Redes sociais -->
      <div class="social">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-twitter"></i>
      </div>

    </div>
  </section>

</body>
</html>
